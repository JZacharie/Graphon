<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphon - Suivi d'Indexation & Tri de Mails</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-surface: rgba(22, 28, 45, 0.45);
            --bg-surface-hover: rgba(22, 28, 45, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 40%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 4rem;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(79, 70, 229, 0.3);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .section-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-secondary);
            font-weight: 500;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: var(--bg-surface-hover);
        }

        .sender-badge {
            font-weight: 500;
            color: #818cf8;
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            margin-right: 0.25rem;
            text-transform: uppercase;
        }

        .tag-important {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .tag-unread {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .tag-promo {
            background-color: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
        }

        .toast {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 300px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .category-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .category-action {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .action-keep { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .action-delete { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .action-consolidate { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .action-review { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }

        .label-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }

        .label-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
        }

        .label-pill .count {
            color: var(--text-primary);
            font-weight: 500;
        }

        .label-delete {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            padding: 0 0 0 0.2rem;
            opacity: 0.4;
            transition: opacity 0.15s, color 0.15s;
        }
        .label-delete:hover {
            opacity: 1;
            color: var(--danger);
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-icon">🏛️</span>
            <span class="logo-text">GRAPHON</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="loadDashboardData()">Rafraîchir</button>
            <button class="btn" id="syncBtn" onclick="triggerSync()">
                ⚡ Synchroniser Gmail
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Stats Grid -->
        <div class="grid-stats">
            <div class="stat-card">
                <div>
                    <div class="stat-label">Mails Indexés</div>
                    <div class="stat-value" id="stat-emails-total">-</div>
                </div>
                <div class="stat-footer">
                    <span>Base RAG prête</span>
                </div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Synchronisations</div>
                    <div class="stat-value" id="stat-sync-requests">-</div>
                </div>
                <div class="stat-footer">
                    <span>Appels totaux à l'API</span>
                </div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Erreurs de sync</div>
                    <div class="stat-value" id="stat-sync-errors" style="color: #f87171;">-</div>
                </div>
                <div class="stat-footer" style="color: var(--text-secondary);">
                    <span>Dernier run stable</span>
                </div>
            </div>
        </div>

        <!-- Labels Section -->
        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">Étiquettes Gmail</h2>
                <div class="header-actions">
                    <button class="btn-action" onclick="loadLabelCategories()">Analyser</button>
                    <button class="btn-action" onclick="cleanupEmptyLabels()">Nettoyer vides</button>
                </div>
            </div>
            <div id="labelsContainer">
                <p style="color: var(--text-secondary);">Cliquez sur "Analyser" pour voir les étiquettes.</p>
            </div>
        </div>

        <!-- Mails List -->
        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">Emails Récents Traités</h2>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Expéditeur</th>
                            <th>Objet</th>
                            <th>Labels</th>
                            <th>RAG Indexation</th>
                        </tr>
                    </thead>
                    <tbody id="emailsTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">
                                Chargement des emails...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Show elegant toasts
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove toast
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Fetch metrics and email counts
        async function loadDashboardData() {
            try {
                const statsResponse = await fetch('/api/stats');
                if (!statsResponse.ok) throw new Error('Impossible de charger les statistiques');
                const stats = await statsResponse.json();
                
                document.getElementById('stat-emails-total').textContent = stats.emails_count;
                document.getElementById('stat-sync-requests').textContent = stats.total_syncs;
                document.getElementById('stat-sync-errors').textContent = stats.sync_errors;

                const emailsResponse = await fetch('/api/emails');
                if (!emailsResponse.ok) throw new Error('Impossible de charger la liste des emails');
                const emails = await emailsResponse.json();

                const tableBody = document.getElementById('emailsTableBody');
                tableBody.innerHTML = '';

                if (emails.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">
                                Aucun email indexé pour le moment. Lancez une synchronisation.
                            </td>
                        </tr>
                    `;
                    return;
                }

                emails.forEach(email => {
                    const tr = document.createElement('tr');
                    
                    const tdDate = document.createElement('td');
                    tdDate.textContent = new Date(email.date).toLocaleDateString('fr-FR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    tr.appendChild(tdDate);

                    const tdSender = document.createElement('td');
                    const spanSender = document.createElement('span');
                    spanSender.className = 'sender-badge';
                    spanSender.textContent = email.from;
                    tdSender.appendChild(spanSender);
                    tr.appendChild(tdSender);

                    const tdSubject = document.createElement('td');
                    tdSubject.textContent = email.subject;
                    tr.appendChild(tdSubject);

                    const tdLabels = document.createElement('td');
                    email.labels.forEach(lbl => {
                        const spanLabel = document.createElement('span');
                        spanLabel.className = 'tag';
                        if (lbl.toLowerCase().includes('unread')) spanLabel.classList.add('tag-unread');
                        else if (lbl.toLowerCase().includes('important')) spanLabel.classList.add('tag-important');
                        else if (lbl.toLowerCase().includes('promo')) spanLabel.classList.add('tag-promo');
                        spanLabel.textContent = lbl;
                        tdLabels.appendChild(spanLabel);
                    });
                    tr.appendChild(tdLabels);

                    const tdAction = document.createElement('td');
                    const btn = document.createElement('button');
                    btn.className = 'btn-action';
                    btn.textContent = 'Indexer RAG';
                    btn.onclick = () => indexEmail(email.id, btn);
                    tdAction.appendChild(btn);
                    tr.appendChild(tdAction);

                    tableBody.appendChild(tr);
                });

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Trigger Gmail synchronisation pipeline
        async function triggerSync() {
            const syncBtn = document.getElementById('syncBtn');
            const originalText = syncBtn.textContent;
            syncBtn.disabled = true;
            syncBtn.className = 'btn btn-secondary';
            syncBtn.innerHTML = '<span class="loading-dots">Lancement en cours</span>';

            try {
                showToast('Démarrage du tri de mail Gmail...', 'success');
                const response = await fetch('/sync', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || 'La synchronisation a échoué');
                }
                showToast(data.message || 'La synchronisation a été lancée en arrière-plan !', 'success');
                // Refresh dashboard immediately and then after 5s and 10s to reflect background progress
                await loadDashboardData();
                setTimeout(loadDashboardData, 3000);
                setTimeout(loadDashboardData, 8000);
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                syncBtn.disabled = false;
                syncBtn.className = 'btn';
                syncBtn.textContent = originalText;
            }
        }

        // Trigger RAG indexing for a single email
        async function indexEmail(id, btn) {
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'En cours...';
            try {
                const response = await fetch(`/rag/index/${id}`, { method: 'POST' });
                if (!response.ok) throw new Error("Erreur lors de l'indexation RAG");
                const data = await response.json();
                showToast(`Email indexé : ${data.chunks_count} chunks créés`, 'success');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // Load and display Gmail label categories
        async function loadLabelCategories() {
            const container = document.getElementById('labelsContainer');
            container.innerHTML = '<p style="color: var(--text-secondary);">Analyse en cours...</p>';
            try {
                const response = await fetch('/api/labels');
                if (!response.ok) throw new Error('Impossible de charger les étiquettes');
                const data = await response.json();
                const categories = data.categories || [];
                if (categories.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">Aucune étiquette trouvée.</p>';
                    return;
                }
                const LABEL_NAMES = {
                    system: 'system',
                    graphon: 'Graphon',
                    stars: 'stars',
                    nested: 'hiérarchiques',
                    promotional: 'promotional',
                    empty_unused: 'empty',
                    low_usage: 'peu utilisées',
                    active: 'actives',
                };
                container.innerHTML = '';
                categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.innerHTML = `
                        <div class="category-header">
                            <span class="category-name">${LABEL_NAMES[cat.name] || cat.name}</span>
                            <span class="category-action action-${cat.action}">${cat.action}</span>
                        </div>
                        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem;">${cat.description}</p>
                        <div class="label-tags">
                            ${cat.labels.map(l => `
                                <span class="label-pill">
                                    ${l.name} <span class="count">(${l.messages_total || 0})</span>
                                    ${cat.action !== 'keep' ? `<button class="label-delete" onclick="deleteLabel('${l.name}', this)">&times;</button>` : ''}
                                </span>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p style="color: var(--danger);">Erreur : ${err.message}</p>`;
            }
        }

        // Delete a single label by name
        async function deleteLabel(name, btn) {
            const pill = btn.closest('.label-pill');
            pill.style.opacity = '0.4';
            try {
                const response = await fetch(`/api/labels/${encodeURIComponent(name)}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Échec de la suppression');
                pill.remove();
                showToast(`Étiquette "${name}" supprimée`, 'success');
            } catch (err) {
                pill.style.opacity = '1';
                showToast(err.message, 'error');
            }
        }

        // Delete all empty labels
        async function cleanupEmptyLabels() {
            if (!confirm('Supprimer toutes les étiquettes vides ?')) return;
            try {
                const response = await fetch('/api/labels/cleanup', { method: 'POST' });
                if (!response.ok) throw new Error('Nettoyage échoué');
                const data = await response.json();
                showToast(`${data.deleted} étiquettes vides supprimées`, data.deleted > 0 ? 'success' : 'success');
                await loadLabelCategories();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Auto-load on entry
        window.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
